services:
  backend:
    build:
      context: .
      dockerfile: server/Dockerfile
    container_name: ai-cybersentinel-backend
    restart: always
    ports:
      - "127.0.0.1:8000:8000"
    environment:
      - APP_SECRET=${APP_SECRET:-change-this-in-production}
      - APP_ENV=${APP_ENV:-production}
      - BIND_HOST=0.0.0.0
      - TARGET_URL=http://127.0.0.1:8000
      - HONEYPOT_ENABLED=${HONEYPOT_ENABLED:-true}
      - THREAT_INTEL_ENABLED=${THREAT_INTEL_ENABLED:-false}
      - ABUSEIPDB_API_KEY=${ABUSEIPDB_API_KEY:-}
      - REDIS_URL=redis://redis:6379/0
      - MAIL_USERNAME=${MAIL_USERNAME:-}
      - MAIL_PASSWORD=${MAIL_PASSWORD:-}
      - MAIL_FROM=${MAIL_FROM:-noreply@ai-cybersentinel.local}
      - MAIL_SERVER=${MAIL_SERVER:-smtp.example.com}
      - MAIL_PORT=${MAIL_PORT:-587}
    volumes:
      - backend-data:/app/data
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - internal

  frontend:
    build:
      context: web-next
      dockerfile: Dockerfile
    container_name: ai-cybersentinel-frontend
    restart: always
    ports:
      - "127.0.0.1:3000:3000"
    environment:
      - AUTH_SECRET=${AUTH_SECRET:-change-me-to-a-long-random-secret}
      - BACKEND_BASE_URL=http://backend:8000
      - NEXT_PUBLIC_AUTH_GITHUB_ENABLED=${NEXT_PUBLIC_AUTH_GITHUB_ENABLED:-false}
      - NEXT_PUBLIC_AUTH_GOOGLE_ENABLED=${NEXT_PUBLIC_AUTH_GOOGLE_ENABLED:-false}
    depends_on:
      - backend
    networks:
      - internal

  redis:
    image: redis:7-alpine
    container_name: ai-cybersentinel-redis
    restart: always
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes --maxmemory 128mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - internal

volumes:
  backend-data:
  redis-data:

networks:
  internal:
    driver: bridge
