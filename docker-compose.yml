services:
  backend:
    build:
      context: .
      dockerfile: server/Dockerfile
    container_name: ai-cybersentinel-backend
    restart: always
    ports:
      - "127.0.0.1:8000:8000"
    environment:
      - "APP_SECRET=${APP_SECRET:?APP_SECRET required -- run: openssl rand -base64 48}"
      - APP_ENV=${APP_ENV:-production}
      - BIND_HOST=0.0.0.0
      - TARGET_URL=http://127.0.0.1:8000
      - HONEYPOT_ENABLED=${HONEYPOT_ENABLED:-true}
      - THREAT_INTEL_ENABLED=${THREAT_INTEL_ENABLED:-false}
      - ABUSEIPDB_API_KEY=${ABUSEIPDB_API_KEY:-}
      - DATABASE_URL=${DATABASE_URL:-postgresql://cybersentinel:cybersentinel@postgres:5432/cybersentinel}
      - REDIS_URL=${REDIS_URL:-redis://:${REDIS_PASSWORD:-change-me-in-production}@redis:6379/0}
      - MAIL_USERNAME=${MAIL_USERNAME:-}
      - MAIL_PASSWORD=${MAIL_PASSWORD:-}
      - MAIL_FROM=${MAIL_FROM:-noreply@cybersentinel.com}
      - MAIL_SERVER=${MAIL_SERVER:-smtp.example.com}
      - MAIL_PORT=${MAIL_PORT:-587}
    volumes:
      - backend-data:/app/data
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - internal

  frontend:
    build:
      context: web-next
      dockerfile: Dockerfile
    container_name: ai-cybersentinel-frontend
    restart: always
    ports:
      - "127.0.0.1:3000:3000"
    environment:
      - "AUTH_SECRET=${AUTH_SECRET:?AUTH_SECRET required -- run: openssl rand -base64 48}"
      - BACKEND_BASE_URL=http://backend:8000
      - NEXT_PUBLIC_AUTH_GITHUB_ENABLED=${NEXT_PUBLIC_AUTH_GITHUB_ENABLED:-false}
      - NEXT_PUBLIC_AUTH_GOOGLE_ENABLED=${NEXT_PUBLIC_AUTH_GOOGLE_ENABLED:-false}
    depends_on:
      - backend
    networks:
      - internal

  nginx:
    image: nginx:1.27-alpine
    container_name: ai-cybersentinel-nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - frontend
      - backend
    networks:
      - internal

  postgres:
    image: postgres:16-alpine
    container_name: ai-cybersentinel-postgres
    restart: always
    environment:
      POSTGRES_USER: cybersentinel
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-cybersentinel}
      POSTGRES_DB: cybersentinel
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cybersentinel"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - internal

  redis:
    image: redis:7-alpine
    container_name: ai-cybersentinel-redis
    restart: always
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis-data:/data
    command: redis-server --requirepass ${REDIS_PASSWORD:-change-me-in-production} --appendonly yes --maxmemory 128mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-change-me-in-production}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - internal

volumes:
  backend-data:
  postgres-data:
  redis-data:

networks:
  internal:
    driver: bridge
