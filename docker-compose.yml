name: ai-ids-project

# M2-07 Docker Compose 端到端验收版本。
#
# 设计要点：
# - DATABASE_URL 显式走 ``postgresql+psycopg://``（与 server/core/database.py 的
#   ``create_app_engine`` 一致；SQLAlchemy 2.0 + psycopg v3 推荐 driver）。
# - backend / frontend 都有 AUTH_SECRET（server/main.py 在生产模式会拒启动）。
# - nginx upstream 用容器服务名（"backend" / "frontend"），不再写 127.0.0.1。
# - nginx 本地 HTTP 入口（端口 80）作为默认；HTTPS 是显式 opt-in（见
#   ``nginx/certs/README.md``）。不再把 80 强制 301 到 443，避免无证书时容器启动失败。
# - migration 作为一次性 init 容器运行，确保新 PostgreSQL 从 baseline 启动。
# - frontend Dockerfile healthcheck 改用首页（见 web-next/Dockerfile 修改），不再
#   走 ``/api/backend/health``（中间件白名单不匹配）。
#
# 验证方法见 ``docs/deploy/COMPOSE_QUICKSTART.md``。

services:
  migrate:
    build:
      context: .
      dockerfile: server/Dockerfile
    container_name: ai-cybersentinel-migrate
    restart: "no"
    command: ["python", "-m", "alembic", "upgrade", "head"]
    environment:
      - "APP_SECRET=${APP_SECRET:?APP_SECRET required -- run: openssl rand -base64 48}"
      - "AUTH_SECRET=${AUTH_SECRET:?AUTH_SECRET required -- run: openssl rand -base64 48}"
      - DATABASE_URL=${DATABASE_URL:-postgresql+psycopg://cybersentinel:cybersentinel@postgres:5432/cybersentinel}
      - APP_ENV=${APP_ENV:-development}
      - NEMO_GUARDRAILS_ENABLED=${NEMO_GUARDRAILS_ENABLED:-false}
    volumes:
      - backend-data:/app/data
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - internal

  backend:
    build:
      context: .
      dockerfile: server/Dockerfile
    container_name: ai-cybersentinel-backend
    restart: always
    ports:
      - "127.0.0.1:8000:8000"
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 256M
    environment:
      - "APP_SECRET=${APP_SECRET:?APP_SECRET required -- run: openssl rand -base64 48}"
      - "AUTH_SECRET=${AUTH_SECRET:?AUTH_SECRET required -- run: openssl rand -base64 48}"
      - APP_ENV=${APP_ENV:-development}
      - BIND_HOST=0.0.0.0
      - TARGET_URL=http://backend:8000
      - HONEYPOT_ENABLED=${HONEYPOT_ENABLED:-false}
      - THREAT_INTEL_ENABLED=${THREAT_INTEL_ENABLED:-false}
      - ABUSEIPDB_API_KEY=${ABUSEIPDB_API_KEY:-}
      # 显式 postgresql+psycopg；requirements.txt 已有 psycopg[binary]
      - DATABASE_URL=${DATABASE_URL:-postgresql+psycopg://cybersentinel:cybersentinel@postgres:5432/cybersentinel}
      - REDIS_URL=${REDIS_URL:-redis://:${REDIS_PASSWORD:?REDIS_PASSWORD required}@redis:6379/0}
      - MAIL_USERNAME=${MAIL_USERNAME:-}
      - MAIL_PASSWORD=${MAIL_PASSWORD:-}
      - MAIL_FROM=${MAIL_FROM:-noreply@cybersentinel.com}
      - MAIL_SERVER=${MAIL_SERVER:-smtp.example.com}
      - MAIL_PORT=${MAIL_PORT:-587}
      - CORS_ORIGINS=${CORS_ORIGINS:-http://127.0.0.1:3000,http://localhost:3000,http://127.0.0.1,http://localhost}
      - NEMO_GUARDRAILS_ENABLED=${NEMO_GUARDRAILS_ENABLED:-false}
      - GUARDRAILS_MCP_API_KEY=${GUARDRAILS_MCP_API_KEY:-}
      - ALERTS_INGEST_TOKEN=${ALERTS_INGEST_TOKEN:?ALERTS_INGEST_TOKEN required}
    volumes:
      - backend-data:/app/data
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    networks:
      - internal

  frontend:
    build:
      context: web-next
      dockerfile: Dockerfile
    container_name: ai-cybersentinel-frontend
    restart: always
    ports:
      - "127.0.0.1:3000:3000"
    environment:
      - "AUTH_SECRET=${AUTH_SECRET:?AUTH_SECRET required -- run: openssl rand -base64 48}"
      - BACKEND_BASE_URL=http://backend:8000
      - NEXT_PUBLIC_AUTH_GITHUB_ENABLED=${NEXT_PUBLIC_AUTH_GITHUB_ENABLED:-false}
      - NEXT_PUBLIC_AUTH_GOOGLE_ENABLED=${NEXT_PUBLIC_AUTH_GOOGLE_ENABLED:-false}
      # 接受通过 nginx 80 入口回源的 host（origin 校验在 web-next/middleware.ts）
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS:-http://127.0.0.1:3000,http://localhost:3000,http://127.0.0.1,http://localhost}
    depends_on:
      - backend
    networks:
      - internal

  nginx:
    image: nginx:1.27-alpine
    container_name: ai-cybersentinel-nginx
    restart: always
    ports:
      - "127.0.0.1:80:80"
    volumes:
      # 本地 HTTP 入口是默认行为；HTTPS 是 opt-in（参考 nginx/certs/README.md）
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro
    depends_on:
      - frontend
      - backend
    networks:
      - internal

  postgres:
    image: postgres:16-alpine
    container_name: ai-cybersentinel-postgres
    restart: always
    environment:
      POSTGRES_USER: cybersentinel
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: cybersentinel
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cybersentinel"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - internal

  redis:
    image: redis:7-alpine
    container_name: ai-cybersentinel-redis
    restart: always
    # Redis 仅在内部网络暴露，不映射到主机
    volumes:
      - redis-data:/data
    command: redis-server --requirepass ${REDIS_PASSWORD:?REDIS_PASSWORD is required} --appendonly yes --maxmemory 128mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:?REDIS_PASSWORD is required}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - internal

volumes:
  backend-data:
  postgres-data:
  redis-data:

networks:
  internal:
    driver: bridge
