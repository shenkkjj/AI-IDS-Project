name: CI Pipeline

on:
  push:
    branches: [main, master, release-*]
  pull_request:
    branches: [main, master]

jobs:
  security-scan:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: .
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-python@0a5c61591373683505ea898e09a3ea4f392ef32e # v5.1.0
        with:
          python-version: "3.13"
          cache: pip
      - name: Install security tools
        run: pip install safety bandit semgrep
      - name: Run Python SAST (Bandit)
        run: bandit -r server/ -f json -o bandit-report.json || true
      - name: Run Python dependency scan (Safety)
        run: pip install -r requirements.txt && safety check --json | tee safety-report.json || true
      - name: Run Semgrep SAST
        run: semgrep --config=auto --json --output=semgrep-report.json server/ || true
      - name: Upload security reports
        uses: actions/upload-artifact@v4
        with:
          name: security-reports
          path: |
            bandit-report.json
            safety-report.json
            semgrep-report.json
          retention-days: 30

  frontend-security:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web-next
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4.1.0
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web-next/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Run npm audit
        run: npm audit --audit-level=moderate || true
      - name: Run Snyk security scan
        run: npm install -g snyk && snyk test || true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}

  backend-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: .
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-python@0a5c61591373683505ea898e09a3ea4f392ef32e # v5.1.0
        with:
          python-version: "3.13"
          cache: pip
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov pytest-asyncio httpx
      - name: Security check .env
        run: python scripts/check_env_security.py
      - name: Run unit tests
        run: |
          echo "APP_SECRET=test-ci-secret-key-for-testing-only-32chars" >> $GITHUB_ENV
          python -m pytest server/tests/ -v --tb=short --cov=server --cov-report=xml --cov-fail-under=80

  frontend-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web-next
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4.1.0
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web-next/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Type check + Lint
        run: npx next lint
      - name: Build
        run: npx next build

  docker-build:
    runs-on: ubuntu-latest
    needs: [backend-tests, frontend-build]
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Docker Compose build
        run: |
          touch .env
          echo "APP_SECRET=test-ci-secret-key-for-testing-only-32chars" > .env
          echo "AUTH_SECRET=test-ci-auth-secret-for-testing-only-32chars" >> .env
          docker compose build
      - name: Run Trivy container scan
        run: |
          docker run --rm -v /var/run/docker.sock:/var/run/docker.sock aquasec/trivy:latest \
            image --severity HIGH,CRITICAL --exit-code 0 --no-progress \
            ai-cybersentinel-backend:latest || true
      - name: Run Hadolint
        run: |
          docker run --rm -v "${{ github.workspace }}/server:/workspace" hadolint/hadolint \
            hadolint --failure ON_ERROR /workspace/Dockerfile || true
