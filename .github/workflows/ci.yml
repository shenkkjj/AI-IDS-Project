name: CI Pipeline

on:
  push:
    branches: [main, master, release-*]
  pull_request:
    branches: [main, master]

jobs:
  backend-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: .
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov pytest-asyncio httpx
      - name: Security check .env
        run: python scripts/check_env_security.py
      - name: Run unit tests
        run: |
          echo "APP_SECRET=test-ci-secret-key-for-testing-only-32chars" >> $GITHUB_ENV
          python -m pytest server/tests/ -v --tb=short --cov=server --cov-report=xml

  frontend-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web-next
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web-next/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Type check + Lint
        run: npx next lint
      - name: Build
        run: npx next build

  docker-build:
    runs-on: ubuntu-latest
    needs: [backend-tests, frontend-build]
    steps:
      - uses: actions/checkout@v4
      - name: Docker Compose build
        run: |
          touch .env
          echo "APP_SECRET=test-ci-secret-key-for-testing-only-32chars" > .env
          echo "AUTH_SECRET=test-ci-auth-secret-for-testing-only-32chars" >> .env
          docker compose build
